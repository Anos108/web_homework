<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đồng hồ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="clock-display" aria-label="Đồng hồ">
      <span id="hours" class="clock-digit">--</span>
      <span class="clock-sep" aria-hidden="true">:</span>
      <span id="minutes" class="clock-digit">--</span>
      <span class="clock-sep" aria-hidden="true">:</span>
      <span id="seconds" class="clock-digit">--</span>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
